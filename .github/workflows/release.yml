name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Tauri Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ChmlFrp节点推荐器 ${{ github.ref_name }}'
          releaseBody: |
            ## 🚀 ChmlFrp 节点推荐器

            快速测试节点延迟，帮助用户选择最优节点。

            ## ✨ 功能特性

            - 🔍 **节点测速** - TCP 连接测试，快速获取节点延迟
            - 🌍 **地域筛选** - 支持国内/国外节点筛选
            - 👤 **用户筛选** - VIP/普通用户节点分类
            - 📊 **智能排序** - 按延迟或编号排序
            - 📌 **窗口置顶** - 方便随时查看测试进度
            - 💾 **结果持久化** - 测试结果自动保存
            - 🔄 **自动更新** - 支持 GitHub 自动检查更新

            ## 📥 下载说明

            | 平台 | 安装包 | 说明 |
            |------|--------|------|
            | Windows | `.msi` 或 `.exe` | 双击安装即可 |
            | macOS | `.dmg` | 拖拽到应用程序文件夹（仅支持 Apple Silicon） |
            | Linux | `.deb` 或 `.AppImage` | 根据发行版安装 |

            ## 📋 系统要求

            - **Windows**: Windows 10/11 (x64)
            - **macOS**: macOS 11.0+ (Apple Silicon)
            - **Linux**: Ubuntu 20.04+ (x64)

            ---

            **问题反馈**: https://github.com/zhengddzz/ChmlFrp-NodeSpeedTest/issues
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
