name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Tauri Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ChmlFrp节点推荐器 ${{ github.ref_name }}'
          releaseBody: |
            ## 🚀 ChmlFrp 节点推荐器

            快速测试节点延迟，帮助用户选择最优节点。

            ## ✨ 功能特性

            - 🔍 **节点测速** - TCP 连接测试，快速获取节点延迟
            - 🌍 **地域筛选** - 支持国内/国外节点筛选
            - 👤 **用户筛选** - VIP/普通用户节点分类
            - 📊 **智能排序** - 按延迟或编号排序
            - 📌 **窗口置顶** - 方便随时查看测试进度
            - 💾 **结果持久化** - 测试结果自动保存
            - 🔄 **自动更新** - 支持 GitHub 自动检查更新

            ## 📥 下载说明

            | 平台 | 安装包 | 说明 |
            |------|--------|------|
            | Windows | `.exe` | 双击安装即可 |
            | macOS | `.dmg` | 拖拽到应用程序文件夹（仅支持 Apple Silicon） |
            | Linux | `.deb` 或 `.AppImage` | 根据发行版安装 |

            ## 📋 系统要求

            - **Windows**: Windows 10/11 (x64)
            - **macOS**: macOS 11.0+ (Apple Silicon)
            - **Linux**: Ubuntu 20.04+ (x64)

            ---

            **问题反馈**: https://github.com/zhengddzz/ChmlFrp-NodeSpeedTest/issues
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Windows signature as artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: src-tauri/target/release/bundle/nsis/*.exe.sig
          retention-days: 1

      - name: Upload macOS signature as artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-sig
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig
            src-tauri/target/release/bundle/macos/*.tar.gz.sig
          retention-days: 1

      - name: Upload Linux signature as artifact
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-sig
          path: src-tauri/target/release/bundle/appimage/*.AppImage.sig
          retention-days: 1

  generate-manifest:
    name: Generate Updater Manifest
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows signature
        uses: actions/download-artifact@v4
        with:
          name: windows-sig
          path: signatures/windows

      - name: Download macOS signature
        uses: actions/download-artifact@v4
        with:
          name: macos-sig
          path: signatures/macos

      - name: Download Linux signature
        uses: actions/download-artifact@v4
        with:
          name: linux-sig
          path: signatures/linux

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO="zhengddzz/ChmlFrp-NodeSpeedTest"
          BASE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}"

          # Windows NSIS signature
          WIN_SIG=""
          WIN_SIG_FILE=$(find signatures/windows -name "*.exe.sig" 2>/dev/null | head -1)
          WIN_EXE_NAME=""
          if [ -n "$WIN_SIG_FILE" ]; then
            WIN_SIG=$(cat "$WIN_SIG_FILE")
            WIN_EXE_NAME=$(basename "${WIN_SIG_FILE%.sig}")
          fi

          # macOS signature
          MAC_SIG=""
          MAC_TAR_NAME=""
          MAC_SIG_FILE=$(find signatures/macos -name "*.tar.gz.sig" 2>/dev/null | head -1)
          if [ -n "$MAC_SIG_FILE" ]; then
            MAC_SIG=$(cat "$MAC_SIG_FILE")
            MAC_TAR_NAME=$(basename "${MAC_SIG_FILE%.sig}")
          fi

          # Linux AppImage signature
          LINUX_SIG=""
          LINUX_IMG_NAME=""
          LINUX_SIG_FILE=$(find signatures/linux -name "*.AppImage.sig" 2>/dev/null | head -1)
          if [ -n "$LINUX_SIG_FILE" ]; then
            LINUX_SIG=$(cat "$LINUX_SIG_FILE")
            LINUX_IMG_NAME=$(basename "${LINUX_SIG_FILE%.sig}")
          fi

          echo "Windows exe: ${WIN_EXE_NAME}, sig: ${WIN_SIG:0:20}..."
          echo "macOS tar: ${MAC_TAR_NAME}, sig: ${MAC_SIG:0:20}..."
          echo "Linux img: ${LINUX_IMG_NAME}, sig: ${LINUX_SIG:0:20}..."

          # Build platforms JSON
          PLATFORMS=""
          PLATFORMS_ARRAY=""

          if [ -n "$WIN_SIG" ] && [ -n "$WIN_EXE_NAME" ]; then
            PLATFORMS_ARRAY="${PLATFORMS_ARRAY}\"windows-x86_64\": {\"signature\": \"${WIN_SIG}\", \"url\": \"${BASE_URL}/${WIN_EXE_NAME}\"}"
          fi

          if [ -n "$MAC_SIG" ] && [ -n "$MAC_TAR_NAME" ]; then
            if [ -n "$PLATFORMS_ARRAY" ]; then
              PLATFORMS_ARRAY="${PLATFORMS_ARRAY},"
            fi
            PLATFORMS_ARRAY="${PLATFORMS_ARRAY}\"darwin-aarch64\": {\"signature\": \"${MAC_SIG}\", \"url\": \"${BASE_URL}/${MAC_TAR_NAME}\"}"
          fi

          if [ -n "$LINUX_SIG" ] && [ -n "$LINUX_IMG_NAME" ]; then
            if [ -n "$PLATFORMS_ARRAY" ]; then
              PLATFORMS_ARRAY="${PLATFORMS_ARRAY},"
            fi
            PLATFORMS_ARRAY="${PLATFORMS_ARRAY}\"linux-x86_64\": {\"signature\": \"${LINUX_SIG}\", \"url\": \"${BASE_URL}/${LINUX_IMG_NAME}\"}"
          fi

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "date": "${DATE}",
            "platforms": {
              ${PLATFORMS_ARRAY}
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
          echo "Uploaded latest.json to release ${GITHUB_REF_NAME}"
